<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Quarter 4, Week 7 – Practice Test</title>
  <link rel="preload" as="image" href="/mascots/kitimus/kitimus-squint.png">
  <style>
    :root{--bg:#f4f6fb;--card:#ffffff;--text:#0f172a;--muted:#475569;--shadow:0 10px 30px rgba(15,23,42,.12);--radius:18px;--link:#1d4ed8;--good:#22c55e;--bad:#ef4444;--btn:#0f172a;--btnText:#ffffff;}
    *{box-sizing:border-box}
    body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:var(--bg);color:var(--text);}
    header{position:sticky;top:0;z-index:10;background:#fff;padding:10px 14px;box-shadow:0 1px 10px rgba(0,0,0,.06);display:flex;align-items:center;gap:10px;}
    header h1{margin:0;font-size:16px;font-weight:1000;text-align:center;flex:1;}
    main{padding:12px;display:flex;justify-content:center;}
    .wrap{width:100%;max-width:760px;}
    .toprow{display:grid;grid-template-columns:auto 1fr auto;gap:10px;align-items:center;margin-bottom:10px;}
    .pill{background:#eef2ff;color:#28327a;font-weight:1000;border-radius:999px;padding:6px 10px;font-size:13px;min-width:88px;text-align:center;}
    .progress{height:14px;background:#e5e7eb;border-radius:999px;overflow:hidden;position:relative;}
    .bar{height:100%;width:0%;background:#c7d2fe;transition:width .25s ease;}
    .bartext{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:900;color:#111827;}
    .kitimus{width:64px;height:64px;user-select:none;pointer-events:none;}
    .kitimus img{width:100%;height:100%;object-fit:contain;}
    .card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px;display:flex;flex-direction:column;gap:14px;}
    .ref{font-weight:1000;font-size:18px;}
    .prompt{font-weight:800;line-height:1.4;}
    select{font-size:16px;font-weight:800;padding:8px 10px;border-radius:10px;border:2px solid #e5e7eb;margin:0 4px;}
    .tiles{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;}
    .tile{border-radius:14px;border:2px solid #e5e7eb;padding:14px 0;text-align:center;font-weight:1000;font-size:20px;cursor:pointer;user-select:none;background:#fff;}
    .tile.used{opacity:.35;cursor:not-allowed;}
    .slots{display:flex;gap:6px;justify-content:center;margin-bottom:8px;}
    .slot{min-width:22px;border-bottom:4px solid #94a3b8;text-align:center;font-weight:1000;font-size:18px;}
    .btn{margin-top:10px;padding:14px;border-radius:16px;border:0;background:var(--btn);color:var(--btnText);font-weight:1000;font-size:16px;cursor:pointer;}
    .btnRow{display:flex;gap:12px;justify-content:center;align-items:center;flex-wrap:wrap;margin-top:18px;}
    .btnRow .btn{min-width:160px;}
    .btn.good{background:var(--good);}
    .btn.bad{background:var(--bad);}
    header .navbtn{appearance:none;background:none;border:0;padding:0;margin:0;color:var(--link);font-weight:900;cursor:pointer;white-space:nowrap;font:inherit;}
    header .home{color:var(--link);font-weight:900;text-decoration:none;white-space:nowrap;}
  </style>
</head>
<body>
<header>
  <button class="navbtn" id="backBtn" type="button">← Back</button>
  <h1>Practice Test</h1>
  <a class="home" href="https://kitimus.com/">Home</a>
</header>
<main><div class="wrap">
  <div class="toprow">
    <div class="pill" id="modePill">Blanks</div>
    <div class="progress"><div class="bar" id="bar"></div><div class="bartext" id="barText"></div></div>
    <div class="kitimus"><img src="/mascots/kitimus/kitimus-squint.png" alt=""></div>
  </div>
  <section class="card" id="card"></section>
</div></main>

<script>
const QUESTIONS = [
  // ── WED IDEA 1 ──
  {
    mode:"blanks",
    ref:"Wednesday, May 6",
    text:"It works ___ of sins, rescues from ___ and the devil...",
    blanks:[
      { answer:"forgiveness", options:["forgiveness","removal","healing","cleansing"] },
      { answer:"death",       options:["death","sin","evil","darkness"] },
      { answer:"eternal",     options:["eternal","full","complete","perfect"] }
    ],
    reviewLabel:"Wed Idea 1: forgiveness / death / eternal"
  },
  // ── WED IDEA 2 ──
  {
    mode:"blanks",
    ref:"Wednesday, May 6",
    text:"...and gives ___ salvation to all who ___ this, as the words and ___ of God declare.",
    blanks:[
      { answer:"eternal",   options:["eternal","full","complete","everlasting"] },
      { answer:"believe",   options:["believe","know","hear","receive"] },
      { answer:"promises",  options:["promises","words","gifts","blessings"] }
    ],
    reviewLabel:"Wed Idea 2: eternal / believe / promises"
  },
  // ── FRIDAY (Mark 16:16) ──
  {
    mode:"blanks",
    ref:"Friday, May 8 — Mark 16:16",
    text:"Whoever ___ and is ___ will be saved, but whoever does not ___ will be condemned.",
    blanks:[
      { answer:"believes",  options:["believes","trusts","knows","hopes"] },
      { answer:"baptized",  options:["baptized","saved","born","washed"] },
      { answer:"believe",   options:["believe","trust","know","obey"] }
    ],
    reviewLabel:"Fri: believes / baptized / believe"
  },
  // ══ SPELLING ══
  { mode:"tiles", ref:"Wednesday, May 6", context:"It works ___ of sins", answer:"forgiveness", reviewLabel:"Spelling: forgiveness" },
  { mode:"tiles", ref:"Wednesday, May 6", context:"rescues from ___", answer:"death", reviewLabel:"Spelling: death" },
  { mode:"tiles", ref:"Wednesday, May 6", context:"gives ___ salvation", answer:"eternal", reviewLabel:"Spelling: eternal" },
  { mode:"tiles", ref:"Wednesday, May 6", context:"gives eternal ___", answer:"salvation", reviewLabel:"Spelling: salvation" },
  { mode:"tiles", ref:"Wednesday, May 6", context:"words and ___ of God", answer:"promises", reviewLabel:"Spelling: promises" },
  { mode:"tiles", ref:"Friday, May 8 — Mark 16:16", context:"Whoever ___ and is baptized", answer:"believes", reviewLabel:"Spelling: believes" },
  { mode:"tiles", ref:"Friday, May 8 — Mark 16:16", context:"whoever ___ and is baptized will be saved", answer:"baptized", reviewLabel:"Spelling: baptized" },
  { mode:"tiles", ref:"Friday, May 8 — Mark 16:16", context:"will be ___", answer:"condemned", reviewLabel:"Spelling: condemned" }
];

let idx=0;const results=[];const missed=new Set();
const card=document.getElementById("card"),bar=document.getElementById("bar"),barText=document.getElementById("barText"),pill=document.getElementById("modePill");
function updateProgress(){const pct=Math.round(((idx+1)/QUESTIONS.length)*100);bar.style.width=pct+"%";barText.textContent=`${idx+1} of ${QUESTIONS.length}`;}
function render(){updateProgress();card.innerHTML="";const q=QUESTIONS[idx];pill.textContent=q.mode==="blanks"?"Blanks":"Spelling";if(q.mode==="blanks")renderBlanks(q);else renderTiles(q);}
function renderBlanks(q){
  const wrap=document.createElement("div");wrap.innerHTML=`<div class="ref">${q.ref}</div>`;
  const p=document.createElement("div");p.className="prompt";let bi=0;
  p.innerHTML=q.text.replaceAll("___",()=>{const b=q.blanks[bi++];const opts=b.options.map(o=>`<option value="${o}">${titleCase(o)}</option>`).join("");return `<select class="blankSel" data-answer="${b.answer}"><option value="">---</option>${opts}</select>`;});
  wrap.appendChild(p);
  const btn=document.createElement("button");btn.className="btn";btn.textContent="Check";
  btn.onclick=()=>{const sel=Array.from(wrap.querySelectorAll("select.blankSel"));const ok=sel.every(s=>normalize(s.value)===normalize(s.dataset.answer));btn.classList.remove("good","bad");btn.classList.add(ok?"good":"bad");results.push({label:q.reviewLabel,ok});if(!ok)missed.add(q.reviewLabel);setTimeout(next,450);};
  card.appendChild(wrap);card.appendChild(btn);
}
function renderTiles(q){
  card.innerHTML=`<div class="ref">${q.ref}</div><div class="prompt">${q.context}</div>`;
  const slots=document.createElement("div");slots.className="slots";
  const target=normalizeAlpha(q.answer).toUpperCase();const targetArr=target.split("");
  targetArr.forEach(()=>{const s=document.createElement("div");s.className="slot";slots.appendChild(s);});
  card.appendChild(slots);
  const totalTiles=targetArr.length<=10?12:18;const decoys=buildDecoys(targetArr,Math.max(0,totalTiles-targetArr.length));const letters=shuffle(targetArr.concat(decoys));
  const grid=document.createElement("div");grid.className="tiles";const tileEls=[];
  letters.forEach(ch=>{const t=document.createElement("button");t.type="button";t.className="tile";t.textContent=ch;t.onclick=()=>{const empty=Array.from(slots.children).find(x=>!x.textContent);if(!empty)return;empty.textContent=ch;t.classList.add("used");t.disabled=true;};tileEls.push(t);grid.appendChild(t);});
  card.appendChild(grid);
  const row=document.createElement("div");row.className="btnRow";
  const backBtn=document.createElement("button");backBtn.className="btn";backBtn.textContent="Backspace";
  const clearBtn=document.createElement("button");clearBtn.className="btn";clearBtn.textContent="Clear";
  const checkBtn=document.createElement("button");checkBtn.className="btn";checkBtn.textContent="Check";
  backBtn.onclick=()=>{const filled=Array.from(slots.children).filter(x=>x.textContent);if(!filled.length)return;const last=filled[filled.length-1];const ch=last.textContent;last.textContent="";const used=tileEls.filter(t=>t.disabled&&t.textContent===ch);if(used.length){const t=used[used.length-1];t.disabled=false;t.classList.remove("used");}};
  clearBtn.onclick=()=>{Array.from(slots.children).forEach(s=>s.textContent="");tileEls.forEach(t=>{t.disabled=false;t.classList.remove("used");});checkBtn.classList.remove("good","bad");};
  checkBtn.onclick=()=>{const attempt=Array.from(slots.children).map(s=>s.textContent||"").join("");const ok=attempt===target;checkBtn.classList.remove("good","bad");checkBtn.classList.add(ok?"good":"bad");results.push({label:q.reviewLabel,ok});if(!ok)missed.add(q.reviewLabel);setTimeout(next,450);};
  row.appendChild(backBtn);row.appendChild(clearBtn);row.appendChild(checkBtn);card.appendChild(row);
}
function next(){if(idx<QUESTIONS.length-1){idx++;render();return;}showSummary();}
function showSummary(){
  const total=results.length,correct=results.filter(r=>r.ok).length,pct=total?Math.round(correct/total*100):0;
  bar.style.width="100%";barText.textContent=`${total} of ${total}`;pill.textContent="Score";
  const misses=Array.from(missed);
  card.innerHTML=`<div class="ref">Practice Test</div><div class="prompt" style="font-weight:900;font-size:28px;margin-top:6px;">Score: ${pct}%</div><div class="prompt" style="margin-top:8px;">You got ${correct} out of ${total} correct.</div><div class="prompt" style="margin-top:14px;font-weight:900;">${misses.length?"Review these:":"Nothing to review. Nice work!"}</div>${misses.length?`<ul style="margin:8px 0 0 22px;font-weight:800;">${misses.map(m=>`<li>${escapeHtml(m)}</li>`).join("")}</ul>`:""}<div class="btnRow" style="margin-top:18px;"><button class="btn" id="tryAgainBtn">Try Again</button></div>`;
  document.getElementById("tryAgainBtn").onclick=()=>{idx=0;results.length=0;missed.clear();render();};
}
function normalize(s){return(s||"").trim().toLowerCase();}
function normalizeAlpha(s){return(s||"").toString().trim().replace(/[^a-zA-Z]/g,"").toLowerCase();}
function titleCase(s){const raw=(s||"").toString().trim();if(!raw)return raw;const proper=new Set(["Christ","God","Jesus","Lord","He","His","Him","Father","Holy","Spirit","Baptism"]);if(proper.has(raw))return raw;return raw.charAt(0).toUpperCase()+raw.slice(1).toLowerCase();}
function buildDecoys(targetArr,count){const alpha="ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");const set=new Set(targetArr);return shuffle(alpha.filter(ch=>!set.has(ch))).slice(0,count);}
function shuffle(a){const x=a.slice();for(let i=x.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[x[i],x[j]]=[x[j],x[i]];}return x;}
function escapeHtml(str){return(str||"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m]));}
render();
</script>
<script>(function(){const HOME="https://kitimus.com/";const back=document.getElementById("backBtn");if(!back)return;back.addEventListener("click",()=>{const before=location.href;history.back();setTimeout(()=>{if(location.href===before)location.href=HOME;},350);});})();</script>
</body>
</html>
