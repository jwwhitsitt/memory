<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Memory Week 3-11</title>
<style>
:root{--blue:#2fa4e7;--green:#2faf9b;--ink:#18324a;--paper:#f5fbff;--card:#ffffff;--line:#cfe7f6;--shadow:0 10px 24px rgba(24,50,74,.10)}
*{box-sizing:border-box} body{margin:0;font-family:Arial,Helvetica,sans-serif;background:linear-gradient(180deg,#eef8ff,#f9fdff);color:var(--ink)}
header{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;padding:14px 16px;background:#fff;border-bottom:2px solid var(--line);position:sticky;top:0}
header .left{justify-self:start} header .center{justify-self:center} header .right{justify-self:end}
.btn,.navbtn{display:inline-flex;align-items:center;gap:.45rem;text-decoration:none;border:none;background:var(--blue);color:#fff;padding:10px 14px;border-radius:14px;font-weight:700;cursor:pointer}
.navbtn.alt{background:var(--green)}
img.kit{height:58px;width:auto;display:block}
main{max-width:920px;margin:0 auto;padding:24px 16px 40px}
.hero,.card{background:var(--card);border:2px solid var(--line);border-radius:24px;box-shadow:var(--shadow)}
.hero{padding:24px;text-align:center}.hero h1{margin:0 0 10px;font-size:2rem}.hero p{margin:8px auto;max-width:640px;line-height:1.6}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:18px;margin-top:20px}
.card{padding:22px;text-align:center}.card h2{margin:0 0 10px}.small{color:#55768e;line-height:1.5}
.card a{margin-top:14px}
</style>
</head>
<body>
<header>
  <div class="left"><button class="navbtn" onclick="history.back()">← Back</button></div>
  <div class="center"><img class="kit" src="../../mascots/kitimus/kitimus-neutral.png" alt="Kitimus"></div>
  <div class="right"><a class="navbtn alt" href="https://kitimus.com/">Home</a></div>
</header>
<main>
  <section class="hero">
    <h1>Memory Verse Week</h1>
    <p>Practice the verse for <strong>3-11</strong> with a study page and a test page.</p>
  </section>
  <section class="grid">
    <article class="card">
      <h2>📖 Learn the Verse</h2>
      <p class="small">Read it, reveal it, and practice it a little at a time.</p>
      <a class="btn" href="3-11/index.html">Open Study Page</a>
    </article>
    <article class="card">
      <h2>🧠 Take the Test</h2>
      <p class="small">Check memory with multiple choice and sentence order practice.</p>
      <a class="btn" href="3-11/test.html">Open Test Page</a>
    </article>
  </section>
</main>
</body>
</html>
